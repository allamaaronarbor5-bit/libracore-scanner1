workflows:
  android-apk:
    name: Android APK Build
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.libracore.scanner"
      java: 17

    scripts:
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
